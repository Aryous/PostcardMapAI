
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapPostcard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css"
    />
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* 3D Perspective for Animation */
      .perspective-1000 {
        perspective: 1000px;
      }
      
      .preserve-3d {
        transform-style: preserve-3d;
      }

      .backface-hidden {
        backface-visibility: hidden;
      }

      .rotate-y-180 {
        transform: rotateY(180deg);
      }

      /* Realistic Shadow for Postcard */
      .postcard-shadow {
        box-shadow: 
          0 1px 2px rgba(0,0,0,0.05), 
          0 4px 16px rgba(0,0,0,0.1),
          0 8px 32px rgba(0,0,0,0.1);
      }

      /* Paper Texture Effect */
      .paper-texture {
        background-color: #fdfbf7;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      }

      /* Envelope Animations */
      @keyframes envelope-in {
        0% { transform: translateY(120%) rotate(-5deg); opacity: 0; }
        100% { transform: translateY(0) rotate(-5deg); opacity: 1; }
      }

      @keyframes flap-open {
        0% { transform: rotateX(0deg); }
        100% { transform: rotateX(180deg); z-index: 0; }
      }

      @keyframes card-eject {
        0% { transform: translateY(0); }
        100% { transform: translateY(-150px); }
      }

      @keyframes envelope-drop {
        0% { transform: translateY(0) rotate(-5deg); opacity: 1; }
        100% { transform: translateY(120%) rotate(-5deg); opacity: 0; }
      }
      
      @keyframes card-settle {
        0% { transform: translateY(-150px) scale(0.9); }
        100% { transform: translateY(0) rotate(2deg) scale(1); }
      }

      /* Compass Styles */
      .compass-body {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 32%, #ffffff 0%, #f5f0e8 60%, #e8dfd0 100%);
        border: 2px solid rgba(150,130,100,0.65);
        box-shadow:
          0 4px 20px rgba(0,0,0,0.22),
          0 1px 4px rgba(0,0,0,0.1),
          inset 0 1px 0 rgba(255,255,255,0.9),
          inset 0 -1px 3px rgba(0,0,0,0.07);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: box-shadow 0.3s ease;
      }
      .group:hover .compass-body {
        box-shadow:
          0 0 0 3px rgba(99,102,241,0.2),
          0 0 18px rgba(99,102,241,0.38),
          0 4px 20px rgba(0,0,0,0.22),
          inset 0 1px 0 rgba(255,255,255,0.9);
      }
      .compass-label {
        position: absolute;
        font-size: 8px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
        user-select: none;
        color: #5c4b35;
      }
      .compass-n { top: 6px;    left: 50%;  transform: translateX(-50%); color: #dc2626; }
      .compass-s { bottom: 6px; left: 50%;  transform: translateX(-50%); }
      .compass-e { right: 6px;  top: 50%;   transform: translateY(-50%); }
      .compass-w { left: 6px;   top: 50%;   transform: translateY(-50%); }
      .compass-needle-wrap {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
      }
      .compass-needle {
        position: absolute;
        width: 7px;
        height: 44px;
        top: -22px;
        left: -3.5px;
        transform-origin: 50% 50%;
        clip-path: polygon(50% 0%, 100% 40%, 100% 60%, 50% 100%, 0% 60%, 0% 40%);
        background: linear-gradient(to bottom, #dc2626 0%, #ef4444 48%, #94a3b8 52%, #64748b 100%);
      }
      .compass-pin {
        position: absolute;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #475569, #1e293b);
        box-shadow: 0 0 0 1.5px rgba(255,255,255,0.65), 0 1px 3px rgba(0,0,0,0.4);
        z-index: 1;
      }
      /* Damped oscillation simulating needle finding north */
      @keyframes wobble-compass {
        0%, 40%, 100% { transform: rotate(0deg); }
        5%   { transform: rotate(32deg); }
        10%  { transform: rotate(-22deg); }
        15%  { transform: rotate(15deg); }
        20%  { transform: rotate(-10deg); }
        25%  { transform: rotate(6deg); }
        30%  { transform: rotate(-3deg); }
        35%  { transform: rotate(1deg); }
      }
      @keyframes spin-compass {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .animate-wobble-compass {
        animation: wobble-compass 4.5s ease-in-out infinite;
      }
      .animate-spin-compass {
        animation: spin-compass 0.5s linear infinite;
      }
    </style>
  <script type="module" src="/index.tsx"></script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
    <div id="root" class="h-screen w-screen flex flex-col"></div>
  </body>
</html>
